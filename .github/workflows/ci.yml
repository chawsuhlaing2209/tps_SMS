name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sms
          POSTGRES_PASSWORD: sms
          POSTGRES_DB: sms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://sms:sms@localhost:5432/sms

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm test
      - run: npm run build
